                                                            <input
                                                                type="text"
                                                                value={tempTimestamp}
                                                                onChange={(e) => setTempTimestamp(e.target.value)}
                                                                onBlur={handleTimestampUpdate}
                                                                onKeyDown={(e) => {
                                                                    if (e.key === 'Enter') {
                                                                        e.preventDefault();
                                                                        handleTimestampUpdate();
                                                                    }
                                                                    if (e.key === 'Escape') setEditingNoteId(null);
                                                                }}
                                                                autoFocus
                                                                className="font-mono bg-slate-700 px-2 py-1 rounded text-xs w-full text-center"
                                                                style={{color: note.color || (categories[0]?.color || '#22d3ee')}}
                                                            />
                                                        ) : (
                                                            <button 
                                                                onClick={() => handleJumpToNote(note)}
                                                                onDoubleClick={() => { setEditingNoteId(note.id); setTempTimestamp(formatTime(note.timestamp)); }}
                                                                className="font-mono bg-slate-800 px-2 py-1 rounded hover:opacity-80 transition-opacity text-xs w-full"
                                                                style={{color: note.color || (categories[0]?.color || '#22d3ee')}}
                                                                title="Jump to time (double-click to edit)"
                                                            >
                                                                {formatTime(note.timestamp)}
                                                            </button>
                                                        )}
                                                    </div>
                                                    
                                                    <div className="flex-1">
                                                        <textarea 
                                                            value={note.text}
                                                            onChange={(e) => updateNoteText(note.id, e.target.value)}
                                                            placeholder="Type note here..."
                                                            className="w-full bg-transparent border-0 focus:ring-0 p-0 text-slate-200 placeholder-slate-600 resize-none h-auto min-h-[1.5rem]"
                                                            rows={1}
                                                            onInput={(e) => {
                                                                e.target.style.height = 'auto';
                                                                e.target.style.height = e.target.scrollHeight + 'px';
                                                            }}
                                                        />
                                                        <div className="relative category-dropdown-container mt-2">
                                                            <button 
                                                                onClick={() => setOpenDropdownId(openDropdownId === note.id ? null : note.id)}
                                                                className="flex items-center space-x-2 text-xs text-slate-400 hover:text-white transition-colors"
                                                            >
                                                                <div className="w-3 h-3 rounded-full" style={{backgroundColor: note.color}}></div>
                                                                <span>{categories.find(c => c.color === note.color)?.name || 'Uncategorized'}</span>
                                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                                                            </button>
                                                            {openDropdownId === note.id && (
                                                                <div className="absolute z-20 top-full mt-1 bg-slate-900 border border-slate-700 rounded-md shadow-lg p-1 w-40">
                                                                    {categories.map(cat => (
                                                                        <button
                                                                            key={cat.id}
                                                                            onClick={() => {
                                                                                updateNoteColor(note.id, cat.color);
                                                                                setOpenDropdownId(null);
                                                                            }}
                                                                            className="w-full flex items-center space-x-2 text-left px-2 py-1 rounded hover:bg-slate-700 text-slate-300 text-sm"
                                                                        >
                                                                            <div className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: cat.color}}></div>
                                                                            <span>{cat.name}</span>
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    <button 
                                                        onClick={() => deleteNote(note.id)}
                                                        className="text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-1"
                                                        title="Delete note"
                                                    >
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="studio-panel rounded-xl p-6 min-h-[300px] max-h-[600px] overflow-y-auto flex flex-col">
                                    <h2 className="text-lg font-semibold mb-4 text-slate-300 border-b border-slate-700 pb-2 flex justify-between items-center">
                                        <span>
                                            Transcript {isEditingTranscript && <span className="text-xs text-yellow-500 ml-2 font-normal">(Editing Mode)</span>}
                                        </span>
                                        <div className="flex space-x-2">
                                            {transcript && (
                                                <button 
                                                    onClick={() => setForceScrollTrigger(prev => prev + 1)}
                                                    className="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-slate-400 hover:text-cyan-400 hover:border-cyan-500 transition-colors mr-2 flex items-center"
                                                    title="Auto-scroll to current sentence"
                                                >
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                                </button>
                                            )}
                                            {transcript && (
                                                <input 
                                                    type="text" 
                                                    placeholder="Find text..." 
                                                    value={transcriptSearchQuery}
                                                    onChange={(e) => setTranscriptSearchQuery(e.target.value)}
                                                    className="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-cyan-500 placeholder-slate-600 w-24 sm:w-32 transition-colors mr-2"
                                                />
                                            )}
                                            
                                            {isEditingTranscript ? (
                                                 <>
                                                    <button onClick={() => setIsEditingTranscript(false)} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded transition-colors">Cancel</button>
                                                    <button onClick={saveTranscriptEdit} className="text-xs bg-cyan-600 hover:bg-cyan-500 text-white font-bold px-3 py-1 rounded transition-colors shadow-lg shadow-cyan-500/20">Save Text</button>
                                                 </>
                                            ) : (
                                                <div className="flex space-x-1">
                                                    <label htmlFor="transcript-upload" className="text-xs bg-slate-700 hover:bg-slate-600 text-cyan-400 px-2 py-1 rounded transition-colors cursor-pointer mr-1" title="Import Transcript (TXT, JSON, SRT, VTT)">
                                                        {transcript ? 'Import' : 'Load Text'}
                                                    </label>
                                                    {transcript && (
                                                        <>
                                                            <button onClick={handleStartTranscriptEdit} className="text-xs bg-slate-700 hover:bg-slate-600 text-cyan-400 px-2 py-1 rounded transition-colors" title="Edit Full Text">Edit</button>
                                                            <button onClick={() => exportTranscript('srt')} className="text-xs bg-slate-700 hover:bg-slate-600 text-cyan-400 px-2 py-1 rounded transition-colors">SRT</button>
                                                            <button onClick={() => exportTranscript('vtt')} className="text-xs bg-slate-700 hover:bg-slate-600 text-cyan-400 px-2 py-1 rounded transition-colors">VTT</button>
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </h2>
                                    {isEditingTranscript ? (
                                        <textarea
                                            value={tempTranscriptText}
                                            onChange={(e) => setTempTranscriptText(e.target.value)}
                                            className="w-full h-full min-h-[400px] bg-slate-900 border border-slate-700 rounded p-4 text-base font-serif text-slate-200 focus:outline-none focus:border-cyan-500 resize-none"
                                            placeholder="Edit transcript text..."
                                        />
                                    ) : (
                                        transcript ? (
                                            <TranscriptViewer text={transcript} sentences={sentenceBoundaries} currentStart={currentSentenceStart} currentTime={currentTime} currentWordStart={currentWordStart} onSentenceClick={handleSentenceClick} searchQuery={transcriptSearchQuery} forceScroll={forceScrollTrigger} />
                                        ) : (
                                            <div className="flex-1 flex flex-col items-center justify-center text-slate-600 italic select-none">
                                                <p>No transcript loaded.</p>
                                                <p className="text-xs mt-2">Upload a text file to follow along.</p>
                                            </div>
                                        )
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {showCategoryManager && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                            <div className="studio-panel rounded-xl p-6 w-full max-w-md">
                                <h3 className="text-lg font-bold text-white mb-4">Manage Categories</h3>
                                <div className="space-y-2 max-h-64 overflow-y-auto mb-4 pr-2">
                                    {categories.map(cat => (
                                        <div key={cat.id} className="flex items-center space-x-2">
                                            <div className="w-5 h-5 rounded-full flex-shrink-0" style={{ backgroundColor: cat.color }}></div>
                                            <input
                                                type="text"
                                                value={cat.name}
                                                onChange={(e) => updateCategoryName(cat.id, e.target.value)}
                                                className="flex-1 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-slate-200 focus:outline-none focus:border-cyan-500"
                                            />
                                            <button onClick={() => deleteCategory(cat.id)} className="text-slate-500 hover:text-red-400 p-1 disabled:opacity-50 disabled:cursor-not-allowed" disabled={categories.length <= 1}>
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd" /></svg>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center mt-4">
                                    <button onClick={addCategory} className="text-xs bg-slate-700 hover:bg-slate-600 text-cyan-400 px-3 py-1 rounded">Add New Category</button>
                                    <button onClick={() => setShowCategoryManager(false)} className="text-sm bg-cyan-600 hover:bg-cyan-500 text-white font-bold px-4 py-1 rounded">Done</button>
                                </div>
                                </div>
                        </div>
                    )}

                    {editingSentenceIndex !== null && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                            <div className="studio-panel rounded-xl p-6 w-full max-w-md">
                                <h3 className="text-lg font-bold text-white mb-4">Edit Timestamps</h3>
                                <p className="text-xs text-slate-400 mb-4 line-clamp-3 italic">
                                    "{sentenceBoundaries[editingSentenceIndex]?.text}"
                                </p>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">Start Time (HH:MM:SS,ms)</label>
                                        <input 
                                            type="text" 
                                            value={editSentenceStart}
                                            onChange={(e) => setEditSentenceStart(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-cyan-400 font-mono focus:border-cyan-500 outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">End Time (HH:MM:SS,ms)</label>
                                        <input 
                                            type="text" 
                                            value={editSentenceEnd}
                                            onChange={(e) => setEditSentenceEnd(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-cyan-400 font-mono focus:border-cyan-500 outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-1">Text Content</label>
                                        <textarea 
                                            value={editSentenceText}
                                            onChange={(e) => setEditSentenceText(e.target.value)}
                                            rows={3}
                                            className="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-sm text-slate-200 focus:border-cyan-500 outline-none resize-none"
                                        />
                                    </div>
                                </div>
                                <div className="flex justify-end items-center mt-6 space-x-2">
                                    <button onClick={() => setEditingSentenceIndex(null)} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-2 rounded">Cancel</button>
                                    <button onClick={saveSentenceEdit} className="text-xs bg-cyan-600 hover:bg-cyan-500 text-white font-bold px-4 py-2 rounded">Save</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AudioNotetaker />);
    </script>
</body>
